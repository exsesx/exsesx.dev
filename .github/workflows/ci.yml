name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run biome:check
      - name: MDX check
        run: bun run mdx:check
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun run test
      - name: Next.js build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ runner.arch }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('package.json', 'src/**', 'public/**', 'next.config.mts', 'postcss.config.js', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nextjs-${{ hashFiles('bun.lock') }}-
      - name: Build
        run: bun run build
      - name: Install browser
        run: bunx playwright install --with-deps --only-shell chromium webkit
      - name: Browser tests
        run: bun run test:e2e
